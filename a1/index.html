<!DOCTYPE html>
<html lang="en">

<head>
	<title>My Web Page</title>
	<meta charset=utf-8>
	<style>
		body {
			margin: 0px;
		}

		div#wrapper {
			width: 1000px;
			margin: auto;
		}

    header {
			display: flex;
			justify-content: space-between;
			align-items: center;

			& select,
			& input[type='search']{
				padding:5px;
			}
		}

		nav {
			display: flex;
			align-items: center;
		}

		header, 
		footer {
			color: white;
			background-color: black;
			padding: 10px 20px;
		}

		main {
			padding: 20px;
      /* common main styles here */
			overflow: auto;
		}
		main#myhome {
      & img {
        float: right;
			}
		}

		footer {
			border-top: 1px solid red;
			text-align: center;
			clear: both;
		}
	</style>
</head>

<body>
	<div id=wrapper>
		<header>
			<nav>
				<a href="index.html"><img height="40" src="images/logo.png" alt="GAMESRUS Controller Logo"></a>
				<select>
					<option>Select an Option...</option>
					<option>dummy</option>
					<option>dummy</option>
				</select>	
			</nav>
			<input type="search" placeholder="Search">
		</header>
		<main id="myhome">
			<img height="200" width="200" src="images/main.jpeg" alt="Game On! Grab your controller">
			<h1>GAMESRUS</h1>
			<h2>THE ULTIMATE GAMING DESTINATION</h2>
		</main>
		<footer>
			&copy;2025 Trevor Student
		</footer>
	</div>
</body>

</html>
