<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Calculator</title>
  <script src="script.js" defer></script>
  <style>
    input[type=number], select, button, #output {
      box-sizing: border-box;
      display: inline-block;
      padding: 5px 10px;
      min-width: 20px;
      min-height: 25px;
      border: 4px ridge #CCC;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <h1>Mini Calculator</h1>
  <input type="number" id="num1" placeholder="Number 1">
  <select id="operator">
    <option value="+">+</option>
    <option value="-">-</option>
    <option value="*">*</option>
    <option value="/">/</option>
  </select>
  <input type="number" id="num2" placeholder="Number 2">
  <button id="calc">=</button>
  <span id="output">Result</span>
  





  
</body>
</html>
