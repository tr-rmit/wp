  <h1>Simple and Complex Planet Lists</h1>

  <table>
    <script>
      let headings = Object.keys(pCA[0]);
      console.log(headings);
      document.write("<tr>");
      for(let i=0; i<headings.length; i++){
        document.write("<th>"+headings[i]+"</th>");
      }
      document.write("</tr>");

      for (let i=0; i<pCA.length; i++) {
        document.write("<tr>");

      }
