<!DOCTYPE html>
<html lang="en">

<head>
  <title>My Web Page</title>
  <meta charset=utf-8>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bree+Serif&family=Fontdiner+Swanky&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap');
    @import url("https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=close,home,search"); 
    
    body {
      margin: 0px;
      font-family: "Newsreader", serif;;
    }

    div#wrapper {
      width: 1000px;
      margin: auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      & select,
      & input[type='search']{
        padding:5px;
      }
    }

    nav {
      display: flex;
      align-items: center;

      & img {
        position: relative;
        top: 2px;
      }
    }

    header, 
    footer {
      color: white;
      background-color: black;
      padding: 10px 20px;
    }
    
    main {
      padding: 20px;
    }
    main#myhome {
      overflow: auto;

      & img {
        float: right;
        border-radius: 50%;
        box-shadow: 5px 5px 10px #0006;
      }
      & h1 {
        font-family: "Fontdiner Swanky";
      }
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: "Bree Serif", serif;
    }
    button {
      font-size: 17pt;
      vertical-align: middle;

      & span.material-symbols-outlined {
        position: relative;
        top: 3px;
      }
    }


    footer {
      text-align: center;
      clear: both; /* As recommended by Tanya */
    }
    



    /* Pretend these aren't here




    main {
      
      /* common main styles here 
      overflow: auto;
    }

*/
  </style>

</head>

<body>
  <div id=wrapper>
    <header>
      <nav>
        <a href="index.html"><img height="40" src="images/logo.png" alt="GAMESRUS Controller Logo"></a>
        <select>
          <option>Select an Option...</option>
          <option>dummy</option>
          <option>dummy</option>
        </select>	
      </nav>
      <input type="search" placeholder="Search">
    </header>
    <main id="myhome">
      <button>Search <span class="material-symbols-outlined">home</span></button>
      <img height="200" width="200" src="images/main.jpeg" alt="Game On! Grab your controller">
      <h1>GAMESRUS</h1>
      <h2>THE ULTIMATE GAMING DESTINATION</h2>
    </main>
    <footer>
      &copy;2025 Trevor Student
    </footer>
  </div>
</body>

</html>
