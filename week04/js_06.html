<!DOCTYPE html>
<html lang="en">

<head>
	<title>Book Object</title>
	<meta charset="UTF-8">
	<script>
		let book = {
			title: "Let the Right One In",
			author: "John Ajvide Lindqvist",
			published: 2005
		}
    const books = [
      {
        title: "Let the Right One In",
        author: "John Ajvide Lindqvist",
        published: 2005
      },
      {
        title: "Star Wars",
        author: "George Lucas",
        published: 1976
      }
    ];
	</script>
	<style>
		body {
			font-family: Arial, sans-serif;
		}

		h1 {
			color: #0099cc;
		}
	</style>
</head>

<body>
	<h1>Literal Objects</h1>
	<p>Right click, inspect, and check the Console for output</p>
	<script>
		//use the . syntax to access the property of the book variable	
		console.log(book.title);
		console.log(book.author);
		console.log(book.published);
    console.table(book);
    console.table(books);
	</script>
</body>

</html>
