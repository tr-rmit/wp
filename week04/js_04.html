<!DOCTYPE html>
<html lang="en">

<head>
	<title>Array of Numbers</title>
	<meta charset=UTF-8>
	<script>
		const primes = [2, 3, 5, 7, 11, 13];
    // also a good place for functions (ie methods)
	</script>
</head>

<body>
	<h1>Prime Numbers</h1>
	<p id="prime-numbers"></p>
	<script>
		for (let i = 0; i < primes.length; i++) {
			document.getElementById("prime-numbers").innerHTML += primes[i] + "<br>";
		}
	</script>
</body>

</html>
