<body>
  <h1>Even more simple JavaScript</h1>
	<script>
    /*
    var -> original variable declaration, all vars are global
    let -> local variable declaration, only exists in scope / block
    const -> use for constants, also objects that are free to change  
    */
		let greeting = "hello";
		alert(greeting);
    console.log(greeting);
	</script>
